[project]
name = "acordes"
version = "1.8.0"
description = "A professional polyphonic MIDI synthesizer and piano TUI application"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Jorge" }]
keywords = ["midi", "synthesizer", "piano", "tui", "music"]

dependencies = [
    "textual>=0.75.0",
    "mido>=1.3.0",
    "python-rtmidi>=1.4.0",
    "pygame>=2.0.0; sys_platform != 'linux' or (platform_machine != 'armv7l' and platform_machine != 'aarch64')",
    "mingus>=0.6.1",
    "numpy>=1.24.0",
    "sounddevice>=0.4.6",
    "scipy>=1.10.0",
]

[tool.uv]
# Prefer pre-built binary wheels over source distributions.
# Critical on ARM (armv7l) where piwheels provides scipy/numpy wheels
# that would otherwise require hours of compilation from source.
prefer-binary = true
# python-rtmidi uses meson-python which needs system ninja. Disabling
# build isolation lets the build process find /usr/bin/ninja on ARM.
no-build-isolation-package = ["python-rtmidi"]

[[tool.uv.index]]
name = "piwheels"
url = "https://www.piwheels.org/simple"
explicit = false

